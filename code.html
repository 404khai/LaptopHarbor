<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edit Profile - LaptopHarbor</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#11e8b6",
                        "background-light": "#ffffff",
                        "background-dark": "#10221e",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px",
                        "custom-form": "12px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col max-w-md mx-auto overflow-x-hidden">
<!-- Top Navigation -->
<div class="flex items-center p-6 pb-2 justify-between">
<button class="text-slate-900 dark:text-slate-100 flex size-10 items-center justify-start focus:outline-none">
<span class="material-symbols-outlined text-3xl">arrow_back</span>
</button>
<h1 class="text-slate-900 dark:text-slate-100 text-2xl font-semibold leading-tight tracking-tight flex-1 ml-4">Edit Profile</h1>
</div>
<!-- Profile Picture Section -->
<div class="flex p-8 @container">
<div class="flex w-full flex-col gap-4 items-center">
<div class="relative group">
<div class="bg-slate-200 dark:bg-slate-800 bg-center bg-no-repeat aspect-square bg-cover rounded-full min-h-32 w-32 border-2 border-slate-100 dark:border-slate-800 shadow-sm" data-alt="Professional portrait of a young man for user profile" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAWmEEk2CGNdqlvAKGFcsWkbCOsXsMbGzVYvjlAEy36C-d7ZQ67vweKXL6uTC9_jTDMlgLETa8Kwlay1sMEs0uel7H-0kvIAdTdbwowqhPZZogpz07AcZmX1_TICljn34yjSFBTt74-O2SBZlVOM_m_ZVGNmuFG0Ddju8o6tduH-0m1WXAIMe8R1aymUzrpvZy6KILivr6_WISXwBVry6StTZAFfnZKT210pPPEsfv0lvFgvYX8MX7Xv8AuYFTwoM3KV_9DJVcVcd95");'>
</div>
<button class="absolute bottom-0 right-0 bg-primary p-2 rounded-full border-4 border-white dark:border-background-dark shadow-md flex items-center justify-center">
<span class="material-symbols-outlined text-slate-900 text-xl font-bold">photo_camera</span>
</button>
</div>
<button class="text-primary text-base font-semibold leading-normal text-center hover:opacity-80 transition-opacity">
                    Change Photo
                </button>
</div>
</div>
<!-- Form Fields -->
<div class="flex flex-col gap-5 px-6 pb-24">
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold uppercase tracking-wider ml-1">Full Name</label>
<input class="form-input flex w-full rounded-custom-form text-slate-900 border-2 border-slate-900 bg-transparent focus:ring-2 focus:ring-primary focus:border-primary h-14 px-4 text-base font-medium placeholder:text-slate-400" placeholder="Enter your name" type="text" value="Alex Rivera"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold uppercase tracking-wider ml-1">Email Address</label>
<input class="form-input flex w-full rounded-custom-form text-slate-900 border-2 border-slate-900 bg-transparent focus:ring-2 focus:ring-primary focus:border-primary h-14 px-4 text-base font-medium placeholder:text-slate-400" placeholder="Enter your email" type="email" value="alex.rivera@laptopharbor.com"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold uppercase tracking-wider ml-1">Phone Number</label>
<input class="form-input flex w-full rounded-custom-form text-slate-900 border-2 border-slate-900 bg-transparent focus:ring-2 focus:ring-primary focus:border-primary h-14 px-4 text-base font-medium placeholder:text-slate-400" placeholder="Enter phone number" type="tel" value="+1 (555) 000-1234"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold uppercase tracking-wider ml-1">Bio</label>
<textarea class="form-textarea flex w-full rounded-custom-form text-slate-900 border-2 border-slate-900 bg-transparent focus:ring-2 focus:ring-primary focus:border-primary p-4 text-base font-medium placeholder:text-slate-400 resize-none" placeholder="Tell us about yourself" rows="4">Tech enthusiast and developer. Looking for the ultimate laptop setup for mobile coding.</textarea>
</div>
</div>
<!-- Bottom Action Button -->
<div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-6 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md">
<button class="w-full bg-primary py-4 rounded-xl text-slate-900 text-lg font-bold shadow-lg hover:shadow-primary/20 transition-all active:scale-[0.98]">
                Save Changes
            </button>
</div>
<div class="h-24 bg-transparent"></div>
</div>
</body></html>
