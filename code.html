<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#17e8b6",
                        "background-light": "#FFFFFF",
                        "background-dark": "#0a0a0a",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "12px",
                        "lg": "12px",
                        "xl": "12px",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Write a Review - LaptopHarbor</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-slate-900 dark:text-slate-100">
<div class="max-w-2xl mx-auto min-h-screen flex flex-col">
<!-- Top Navigation -->
<header class="flex items-center justify-between p-6 border-b border-slate-100 dark:border-slate-800">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="text-xl font-bold tracking-tight">Write a Review</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-1 p-6 space-y-8">
<!-- Product Identification Section (Optional Context) -->
<div class="flex items-center gap-4 p-4 bg-slate-50 dark:bg-slate-900 rounded-xl">
<div class="w-16 h-16 bg-white dark:bg-slate-800 rounded-lg flex items-center justify-center border border-slate-200 dark:border-slate-700 overflow-hidden">
<img class="object-cover w-full h-full" data-alt="Sleek silver high-end laptop on desk" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBCMHK6QD_9JJxtISBzUHendBlwylUI2KYB7odTWOFB0XIqQeu7ULw56991EllrDAl-DZIlzz-wsEcRT1g2WRH4diJt_1FpxfcyWobQq70qyzyLbIWB9BRraoWWsSAZRzDfyvGlhC7WWp9Ao6nP3O4tomhE8TchGd701zmv8S8FZ6VOeBv_FCdiVqaz3kvdQ72d-Osdjcq39kW6vumsWgBtd8-osSLrPKX-qDTAYkviz_FQPAlX5xc-rI2LSUwSsBcg9aPQGfk59Cux"/>
</div>
<div>
<p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Reviewing</p>
<h2 class="font-bold text-lg">ProBook X15 - Ultra 7 Edition</h2>
</div>
</div>
<!-- Rating Section -->
<section class="space-y-4">
<h3 class="text-lg font-bold">Overall Rating</h3>
<div class="flex gap-2">
<!-- Star Rating Interactive -->
<button class="text-primary hover:scale-110 transition-transform">
<span class="material-symbols-outlined !text-4xl fill-1" style="font-variation-settings: 'FILL' 1">star</span>
</button>
<button class="text-primary hover:scale-110 transition-transform">
<span class="material-symbols-outlined !text-4xl fill-1" style="font-variation-settings: 'FILL' 1">star</span>
</button>
<button class="text-primary hover:scale-110 transition-transform">
<span class="material-symbols-outlined !text-4xl fill-1" style="font-variation-settings: 'FILL' 1">star</span>
</button>
<button class="text-primary hover:scale-110 transition-transform">
<span class="material-symbols-outlined !text-4xl fill-1" style="font-variation-settings: 'FILL' 1">star</span>
</button>
<button class="text-slate-300 dark:text-slate-700 hover:scale-110 transition-transform">
<span class="material-symbols-outlined !text-4xl">star</span>
</button>
<span class="ml-2 self-center font-bold text-xl text-slate-400">4.0</span>
</div>
</section>
<!-- Form Fields -->
<form class="space-y-6">
<!-- Title Field -->
<div class="flex flex-col gap-2">
<label class="text-sm font-bold uppercase tracking-wide text-slate-700 dark:text-slate-300">Review Title</label>
<input class="w-full h-14 px-4 bg-transparent border-2 border-slate-900 dark:border-slate-100 rounded-lg focus:ring-primary focus:border-primary transition-all placeholder:text-slate-400" placeholder="Enter review title" type="text"/>
</div>
<!-- Body Field -->
<div class="flex flex-col gap-2">
<label class="text-sm font-bold uppercase tracking-wide text-slate-700 dark:text-slate-300">Review Body</label>
<textarea class="w-full p-4 bg-transparent border-2 border-slate-900 dark:border-slate-100 rounded-lg focus:ring-primary focus:border-primary transition-all placeholder:text-slate-400 resize-none" placeholder="Share your thoughts about this laptop..." rows="6"></textarea>
</div>
<!-- Photo Upload Section -->
<div class="flex flex-col gap-2">
<label class="text-sm font-bold uppercase tracking-wide text-slate-700 dark:text-slate-300">Add Photos</label>
<div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
<button class="aspect-square flex flex-col items-center justify-center gap-2 border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-lg hover:border-primary hover:text-primary transition-all group" type="button">
<span class="material-symbols-outlined text-3xl group-hover:scale-110 transition-transform">add_a_photo</span>
<span class="text-xs font-bold">Add Photo</span>
</button>
<!-- Image Preview Placeholder -->
<div class="aspect-square bg-slate-100 dark:bg-slate-800 rounded-lg relative overflow-hidden group">
<img class="object-cover w-full h-full opacity-80 group-hover:opacity-100 transition-opacity" data-alt="Closeup of a modern laptop keyboard with backlight" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAAY6ul8DySTrrSNbVBSASPDTyx4FXp9-b_v2i6a0mTB58LPf7I5ZU1U5_DQgIqgkqiIUCw4KahWgcjb59aVRgEYfFQp8oh4-KzgXfoTMJzdgdDRxl7QJZzPQJZVokBD45KaAVAK-ps7oIqr0ErUCUYllCtArY4RtNjAYo99hfBQw2mUIosycxRHNhY4SLT4HnUsjgkNAETE9JmeMDbJW7zZz2CuUKn9TelXYx_3fUIzHhRFrQIUyzQW-D-Q2aWqEUi2gtjP9AMbkRq"/>
<button class="absolute top-2 right-2 bg-slate-900/50 text-white w-6 h-6 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-sm">close</span>
</button>
</div>
</div>
</div>
</form>
</main>
<!-- Action Footer -->
<footer class="p-6 border-t border-slate-100 dark:border-slate-800 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md sticky bottom-0">
<button class="w-full h-14 bg-primary text-slate-900 font-black text-lg uppercase tracking-widest rounded-lg shadow-lg shadow-primary/20 active:scale-95 transition-all">
                Submit Review
            </button>
<p class="text-center text-xs text-slate-500 mt-4">
                By submitting, you agree to LaptopHarbor's <a class="underline" href="#">Community Guidelines</a>.
            </p>
</footer>
</div>
</body></html>
