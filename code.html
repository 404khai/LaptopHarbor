<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#11e8b6",
                        "background-light": "#FFFFFF",
                        "background-dark": "#10221e",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "12px",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        'settings-card': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
                    }
                },
            },
        }
    </script>
<title>LaptopHarbor Settings</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto bg-background-light">
<!-- Header -->
<header class="flex items-center px-6 pt-8 pb-4 bg-background-light sticky top-0 z-10">
<button class="mr-4 h-11 w-11 flex items-center justify-center rounded-full hover:bg-slate-100 transition-colors">
<span class="material-symbols-outlined text-slate-900">arrow_back</span>
</button>
<h1 class="text-[24pt] font-bold text-slate-900 leading-none">Settings</h1>
</header>
<main class="flex-1 px-6 pb-24">
<!-- Account Section -->
<section class="mt-6">
<h3 class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-3 px-1">Account</h3>
<div class="bg-white rounded-lg shadow-settings-card border border-slate-100 overflow-hidden">
<button class="w-full flex items-center justify-between px-4 min-h-[56px] hover:bg-slate-50 transition-colors border-b border-slate-50">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-900">person</span>
<span class="text-slate-900 font-medium">Edit Profile</span>
</div>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between px-4 min-h-[56px] hover:bg-slate-50 transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-900">lock</span>
<span class="text-slate-900 font-medium">Change Password</span>
</div>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
</div>
</section>
<!-- Preferences Section -->
<section class="mt-8">
<h3 class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-3 px-1">Preferences</h3>
<div class="bg-white rounded-lg shadow-settings-card border border-slate-100 overflow-hidden">
<div class="w-full flex items-center justify-between px-4 min-h-[56px] border-b border-slate-50">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-900">notifications</span>
<span class="text-slate-900 font-medium">Notifications</span>
</div>
<div class="relative inline-flex h-6 w-11 items-center rounded-full bg-primary">
<span class="inline-block h-4 w-4 translate-x-6 transform rounded-full bg-white transition"></span>
</div>
</div>
<div class="w-full flex items-center justify-between px-4 min-h-[56px] border-b border-slate-50">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-900">dark_mode</span>
<span class="text-slate-900 font-medium">Dark Mode</span>
</div>
<div class="relative inline-flex h-6 w-11 items-center rounded-full bg-slate-200">
<span class="inline-block h-4 w-4 translate-x-1 transform rounded-full bg-white transition shadow-sm"></span>
</div>
</div>
<button class="w-full flex items-center justify-between px-4 min-h-[56px] hover:bg-slate-50 transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-900">payments</span>
<span class="text-slate-900 font-medium">Currency</span>
</div>
<div class="flex items-center gap-1">
<span class="text-slate-500 text-sm font-medium">USD</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</div>
</button>
</div>
</section>
<!-- Security Section -->
<section class="mt-8">
<h3 class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-3 px-1">Security</h3>
<div class="bg-white rounded-lg shadow-settings-card border border-slate-100 overflow-hidden">
<button class="w-full flex items-center justify-between px-4 min-h-[56px] hover:bg-slate-50 transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-900">verified_user</span>
<span class="text-slate-900 font-medium">Two-Factor Authentication</span>
</div>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
</div>
</section>
<!-- Legal & Support Section -->
<section class="mt-8">
<h3 class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-3 px-1">Legal &amp; Support</h3>
<div class="bg-white rounded-lg shadow-settings-card border border-slate-100 overflow-hidden">
<button class="w-full flex items-center justify-between px-4 min-h-[56px] hover:bg-slate-50 transition-colors border-b border-slate-50">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-900">description</span>
<span class="text-slate-900 font-medium">Terms of Service</span>
</div>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between px-4 min-h-[56px] hover:bg-slate-50 transition-colors border-b border-slate-50">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-900">policy</span>
<span class="text-slate-900 font-medium">Privacy Policy</span>
</div>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between px-4 min-h-[56px] hover:bg-slate-50 transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-900">help_center</span>
<span class="text-slate-900 font-medium">Help Center</span>
</div>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</button>
</div>
</section>
<!-- Logout Section -->
<section class="mt-10 mb-8">
<button class="w-full flex items-center justify-center gap-2 px-4 h-[56px] bg-white border border-red-100 rounded-lg shadow-sm hover:bg-red-50 transition-colors">
<span class="material-symbols-outlined text-red-600">logout</span>
<span class="text-red-600 font-bold">Log Out</span>
</button>
<p class="text-center text-slate-400 text-xs mt-6">Version 2.4.1 (Build 108)</p>
</section>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto flex gap-2 border-t border-slate-100 bg-white/95 backdrop-blur-sm px-4 pb-4 pt-2 z-20">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 transition-colors hover:text-primary" href="#">
<span class="material-symbols-outlined">home</span>
<p class="text-[10px] font-medium leading-normal">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 transition-colors hover:text-primary" href="#">
<span class="material-symbols-outlined">search</span>
<p class="text-[10px] font-medium leading-normal">Search</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 transition-colors hover:text-primary" href="#">
<span class="material-symbols-outlined">shopping_bag</span>
<p class="text-[10px] font-medium leading-normal">Orders</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-900" href="#">
<div class="relative flex flex-col items-center">
<span class="material-symbols-outlined fill-[1]">settings</span>
<p class="text-[10px] font-bold leading-normal">Settings</p>
<div class="absolute -bottom-2 h-1 w-1 rounded-full bg-primary"></div>
</div>
</a>
</nav>
</div>
</body></html>
