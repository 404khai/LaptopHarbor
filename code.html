<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LaptopHarbor - Payment Selection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#11e8b6",
                        "background-light": "#ffffff",
                        "background-dark": "#10221e",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .custom-radio:checked {
            background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='black' xmlns='http://www.w3.org/2000/svg'%3e%3ccircle cx='8' cy='8' r='3'/%3e%3c/svg%3e");
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-md mx-auto min-h-screen flex flex-col bg-white dark:bg-background-dark shadow-sm">
<!-- Header -->
<header class="flex items-center px-4 py-6 justify-between">
<button aria-label="Go back" class="flex size-11 shrink-0 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="text-xl font-bold leading-tight tracking-tight flex-1 text-center pr-11">Payment Method</h1>
</header>
<!-- Progress Indicator (Step 3 of 4) -->
<div class="flex w-full flex-row items-center justify-center gap-3 py-4">
<div class="h-1.5 w-8 rounded-full bg-slate-200 dark:bg-slate-700"></div>
<div class="h-1.5 w-8 rounded-full bg-slate-200 dark:bg-slate-700"></div>
<div class="h-1.5 w-8 rounded-full bg-primary"></div>
<div class="h-1.5 w-8 rounded-full bg-slate-200 dark:bg-slate-700"></div>
</div>
<main class="flex-1 px-4 pb-24">
<h2 class="text-lg font-bold pt-6 pb-4">Select Payment Method</h2>
<!-- Payment Options -->
<div class="grid grid-cols-1 gap-3">
<!-- Credit Card (Selected) -->
<label class="flex items-center justify-between p-4 rounded-xl border-2 border-primary bg-primary/5 cursor-pointer min-h-[56px]">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined">credit_card</span>
<span class="font-semibold text-sm">Credit Card</span>
</div>
<input checked="" class="custom-radio h-5 w-5 border-2 border-slate-900 text-primary focus:ring-primary focus:ring-offset-0 bg-white" name="payment" type="radio"/>
</label>
<!-- PayPal -->
<label class="flex items-center justify-between p-4 rounded-xl border border-slate-900 bg-white dark:bg-slate-800 cursor-pointer min-h-[56px] hover:border-primary transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="font-semibold text-sm text-slate-900 dark:text-slate-100">PayPal</span>
</div>
<input class="custom-radio h-5 w-5 border-2 border-slate-300 dark:border-slate-600 text-primary focus:ring-primary focus:ring-offset-0 bg-white" name="payment" type="radio"/>
</label>
<!-- Apple Pay -->
<label class="flex items-center justify-between p-4 rounded-xl border border-slate-900 bg-white dark:bg-slate-800 cursor-pointer min-h-[56px] hover:border-primary transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined">ios</span>
<span class="font-semibold text-sm text-slate-900 dark:text-slate-100">Apple Pay</span>
</div>
<input class="custom-radio h-5 w-5 border-2 border-slate-300 dark:border-slate-600 text-primary focus:ring-primary focus:ring-offset-0 bg-white" name="payment" type="radio"/>
</label>
<!-- Google Pay -->
<label class="flex items-center justify-between p-4 rounded-xl border border-slate-900 bg-white dark:bg-slate-800 cursor-pointer min-h-[56px] hover:border-primary transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined">google</span>
<span class="font-semibold text-sm text-slate-900 dark:text-slate-100">Google Pay</span>
</div>
<input class="custom-radio h-5 w-5 border-2 border-slate-300 dark:border-slate-600 text-primary focus:ring-primary focus:ring-offset-0 bg-white" name="payment" type="radio"/>
</label>
</div>
<!-- Card Details Form -->
<section class="mt-8">
<h2 class="text-lg font-bold pb-4">Card Details</h2>
<div class="flex flex-col gap-4">
<div class="flex flex-col gap-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-slate-500">Cardholder Name</label>
<input class="w-full h-12 px-4 rounded-lg border-2 border-slate-900 focus:border-primary focus:ring-0 text-sm bg-white dark:bg-slate-900" placeholder="John Doe" type="text"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-slate-500">Card Number</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-lg border-2 border-slate-900 focus:border-primary focus:ring-0 text-sm bg-white dark:bg-slate-900" placeholder="0000 0000 0000 0000" type="text"/>
<div class="absolute right-3 top-1/2 -translate-y-1/2 flex gap-1">
<div class="w-8 h-5 bg-slate-200 rounded-sm" data-alt="Visa logo placeholder"></div>
<div class="w-8 h-5 bg-slate-200 rounded-sm" data-alt="Mastercard logo placeholder"></div>
</div>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-slate-500">Expiry Date</label>
<input class="w-full h-12 px-4 rounded-lg border-2 border-slate-900 focus:border-primary focus:ring-0 text-sm bg-white dark:bg-slate-900" placeholder="MM/YY" type="text"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-slate-500">CVV</label>
<input class="w-full h-12 px-4 rounded-lg border-2 border-slate-900 focus:border-primary focus:ring-0 text-sm bg-white dark:bg-slate-900" placeholder="123" type="password"/>
</div>
</div>
</div>
</section>
<!-- Order Summary -->
<section class="mt-8 p-6 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-100 dark:border-slate-800">
<div class="flex flex-col gap-3">
<div class="flex justify-between items-center">
<span class="text-slate-600 dark:text-slate-400">Subtotal</span>
<span class="font-semibold">$1,299.00</span>
</div>
<div class="flex justify-between items-center">
<span class="text-slate-600 dark:text-slate-400">Shipping</span>
<span class="font-semibold">$0.00</span>
</div>
<div class="h-px bg-slate-200 dark:bg-slate-700 my-1"></div>
<div class="flex justify-between items-center">
<span class="text-lg font-bold">Total</span>
<span class="text-lg font-bold">$1,299.00</span>
</div>
</div>
</section>
</main>
<!-- Footer Button -->
<footer class="sticky bottom-0 w-full p-4 bg-white dark:bg-background-dark border-t border-slate-100 dark:border-slate-800">
<button class="w-full h-14 bg-primary text-slate-900 font-bold rounded-xl text-lg hover:brightness-105 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                Review Order
                <span class="material-symbols-outlined">chevron_right</span>
</button>
</footer>
</div>
</body></html>
