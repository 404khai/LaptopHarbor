<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#11e8b6",
                        "background-light": "#ffffff",
                        "background-dark": "#10221e",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>LaptopHarbor - Login</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="flex min-h-screen flex-col items-center justify-center px-4 py-12">
<div class="w-full max-w-md space-y-8">
<!-- TopAppBar / Header Section -->
<div class="flex flex-col items-center text-center">
<div class="mb-4 flex h-16 w-16 items-center justify-center rounded-xl bg-slate-900 text-primary">
<span class="material-symbols-outlined !text-4xl">laptop_mac</span>
</div>
<h2 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-slate-100">LaptopHarbor</h2>
<p class="mt-2 text-sm text-slate-500 dark:text-slate-400">Welcome back! Please enter your details.</p>
</div>
<!-- Form Section -->
<form class="mt-8 space-y-6">
<div class="space-y-4">
<!-- Email Field -->
<div class="flex flex-col">
<label class="mb-1.5 text-sm font-semibold text-slate-900 dark:text-slate-100" for="email">Email Address</label>
<input autocomplete="email" class="block h-14 w-full rounded-xl border border-slate-900 bg-transparent px-4 text-slate-900 placeholder-slate-400 focus:border-primary focus:ring-1 focus:ring-primary dark:border-slate-700 dark:text-slate-100" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col">
<label class="mb-1.5 text-sm font-semibold text-slate-900 dark:text-slate-100" for="password">Password</label>
<div class="relative">
<input autocomplete="current-password" class="block h-14 w-full rounded-xl border border-slate-900 bg-transparent px-4 pr-12 text-slate-900 placeholder-slate-400 focus:border-primary focus:ring-1 focus:ring-primary dark:border-slate-700 dark:text-slate-100" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400 hover:text-slate-600" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
</div>
<div class="flex items-center justify-between">
<div class="flex items-center">
<input class="h-4 w-4 rounded border-slate-300 text-primary focus:ring-primary" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-slate-600 dark:text-slate-400" for="remember-me">Remember me</label>
</div>
<div class="text-sm">
<a class="font-semibold text-primary hover:opacity-80 transition-opacity" href="#">Forgot Password?</a>
</div>
</div>
<!-- Primary Action Button -->
<div>
<button class="group relative flex h-14 w-full items-center justify-center rounded-xl bg-primary px-4 text-base font-bold text-slate-900 transition-all hover:brightness-105 active:scale-[0.98]" type="submit">
                        Sign In
                    </button>
</div>
</form>
<!-- Divider -->
<div class="mt-8">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-800"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="bg-background-light px-4 text-slate-500 dark:bg-background-dark dark:text-slate-400">Or continue with</span>
</div>
</div>
<!-- Social Login Buttons -->
<div class="mt-6 grid grid-cols-2 gap-4">
<button class="flex h-12 w-full items-center justify-center rounded-xl border border-slate-900 bg-transparent transition-colors hover:bg-slate-50 dark:border-slate-700 dark:hover:bg-slate-800">
<svg class="h-5 w-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="ml-2 text-sm font-semibold text-slate-900 dark:text-slate-100">Google</span>
</button>
<button class="flex h-12 w-full items-center justify-center rounded-xl border border-slate-900 bg-transparent transition-colors hover:bg-slate-50 dark:border-slate-700 dark:hover:bg-slate-800">
<svg class="h-5 w-5 fill-slate-900 dark:fill-slate-100" viewbox="0 0 24 24">
<path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2.104-.156-3.344 1.091-4.3 1.091zM14.032 4.414c1.104-1.325 1.571-3.143 1.363-4.414-1.286.052-2.844.857-3.766 1.935-.831.96-1.558 2.805-1.363 4.026 1.429.117 2.844-.688 3.766-1.547z"></path>
</svg>
<span class="ml-2 text-sm font-semibold text-slate-900 dark:text-slate-100">Apple</span>
</button>
</div>
</div>
<!-- Bottom Link -->
<p class="mt-10 text-center text-sm text-slate-500 dark:text-slate-400">
                Don't have an account? 
                <a class="font-bold text-slate-900 underline decoration-primary decoration-2 underline-offset-4 hover:text-primary transition-colors dark:text-slate-100" href="#">Sign up for free</a>
</p>
</div>
</div>
</body></html>
