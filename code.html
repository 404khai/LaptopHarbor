<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LaptopHarbor - Your Cart</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#11e8b6",
                        "background-light": "#f6f8f8",
                        "background-dark": "#10221e",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-white dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-screen w-full flex-col overflow-x-hidden">
<!-- Header -->
<header class="flex items-center bg-white dark:bg-background-dark p-4 border-b border-slate-100 dark:border-slate-800 justify-between sticky top-0 z-10">
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">LaptopHarbor</h1>
</header>
<!-- Main Content -->
<main class="flex flex-1 flex-col items-center justify-center px-6 py-12">
<div class="flex flex-col items-center gap-8 w-full max-w-md">
<!-- Minimalist Illustration Container -->
<div class="relative flex items-center justify-center w-48 h-48 bg-slate-50 dark:bg-slate-900/50 rounded-full">
<span class="material-symbols-outlined text-slate-300 dark:text-slate-700 !text-[120px] font-light">shopping_bag</span>
<!-- Decorative Element -->
<div class="absolute bottom-10 right-10 w-12 h-12 bg-primary/20 rounded-full blur-xl"></div>
</div>
<div class="flex flex-col items-center gap-3">
<h2 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight tracking-tight text-center">
                        Your cart is empty
                    </h2>
<p class="text-slate-500 dark:text-slate-400 text-base font-normal leading-relaxed text-center max-w-[320px]">
                        Looks like you haven't added any laptops to your cart yet.
                    </p>
</div>
<!-- CTA Button -->
<button class="flex min-w-[200px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-8 bg-primary hover:opacity-90 transition-opacity text-slate-900 text-base font-bold leading-normal tracking-wide shadow-lg shadow-primary/20">
<span class="truncate">Start Shopping</span>
</button>
<!-- Secondary Helper -->
<div class="mt-4 flex flex-col items-center gap-4">
<p class="text-xs text-slate-400 dark:text-slate-500 font-medium uppercase tracking-widest">Recommended Categories</p>
<div class="flex gap-2">
<span class="px-3 py-1 bg-slate-100 dark:bg-slate-800 rounded-full text-xs font-semibold">Gaming</span>
<span class="px-3 py-1 bg-slate-100 dark:bg-slate-800 rounded-full text-xs font-semibold">Ultrabooks</span>
<span class="px-3 py-1 bg-slate-100 dark:bg-slate-800 rounded-full text-xs font-semibold">Workstations</span>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="sticky bottom-0 w-full border-t border-slate-100 dark:border-slate-800 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md px-4 pb-6 pt-3 flex justify-around items-center">
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
<p class="text-[10px] font-medium leading-normal">Home</p>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">search</span>
<p class="text-[10px] font-medium leading-normal">Search</p>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<div class="relative">
<span class="material-symbols-outlined text-primary fill-1">shopping_cart</span>
<span class="absolute -top-1 -right-1 flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
</span>
</div>
<p class="text-[10px] font-bold leading-normal">Cart</p>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
<p class="text-[10px] font-medium leading-normal">Profile</p>
</a>
</nav>
</div>
</body></html>
